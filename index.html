<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Barber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar bg-black">
        <div class="container-fluid">
            <a class="navbar-brand text-white">Boot Barber</a>
            <form class="d-flex" role="search">
                <input class="form-control me-2" type="search" placeholder="Pesquisar" aria-label="Search" />
                <button class="btn btn-outline-light" type="submit">Buscar</button>
            </form>
        </div>
    </nav>

    <!-- Destaque -->
    <header class="text-center bg-dark text-white py-5">
        <div class="container">
            <h1 class="fw-bold">A melhor barbearia!</h1>
            <p>Cortes, barba e cursos!</p>
        </div>
    </header>

    <!-- Eventos -->
    <section class="py-5">
        <div class="container">
            <h2 class="text-center fw-bold mb-5">Serviços</h2>
            <div class="row g-4">
                <div class="col-md-6 col-lg-4">
                    <div class="card" style="width: 18rem;">
                        <img src="img/haircut1.jpg" class="card-img-top" alt="...">
                        <div class="card-body">
                            <h5 class="card-title">Lineup</h5>
                            <p class="card-text">Lineups e Fades</p>
                            <a href="#" class="btn bg-dark text-white">Contato</a>
                        </div>
                    </div>
                </div>

                <div class="col-md-6 col-lg-4">
                    <div class="card" style="width: 18rem;">
                        <img src="img/pexels-jari-lobo-456989711-15659458.jpg" class="card-img-top" alt="...">
                        <div class="card-body">
                            <h5 class="card-title">Corte Masculino</h5>
                            <p class="card-text">Tesoura ou Máquina.</p>
                            <a href="#" class="btn bg-dark text-white">Contato</a>
                        </div>
                    </div>
                </div>

                <div class="col-md-6 col-lg-4">
                    <div class="card" style="width: 18rem;">
                        <img src="img/pexels-maksgelatin-4663136.jpg" class="card-img-top" alt="...">
                        <div class="card-body">
                            <h5 class="card-title">Cursos</h5>
                            <p class="card-text">Aprenda com os melhores barbeiros.</p>
                            <a href="#" class="btn bg-dark text-white">Contato</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>
    <!-- Formulário de Inscrição -->

    <section class="py-5 bg-white">
        <div class="container">
            <h2 class="text-center fw-bold mb-5">Contato</h2>
            <form>
                <div class="mb-3">
                    <label for="nome-completo" class="form-label">Nome completo</label>
                    <input type="name" class="form-control" id="nome-completo">
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">E-mail</label>
                    <input type="email" class="form-control" id="email">
                </div>

                <div class="mb-3">
                    <label for="evento" class="form-label">Selecione o Corte</label>

                    <select type="email" class="form-select" id="nome-completo">
                        <option>Barba</option>
                        <option>Cabelo</option>
                        <option>Cabelo e Barba</option>
                    </select>
                </div>
                <button class="btn bg-black text-white w-100">Inscrever-se</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-black text-white text-center py-5 mt-5">
        <p>2042 Evento Cultural - Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
